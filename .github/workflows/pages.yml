name: Deploy site

# Publishes the landing page + screenshots + mod database to GitHub Pages.
# Runs when content is pushed here (the private source repo pushes a fresh
# data.generated.json on each refresh) or manually.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.dep.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage site
        run: |
          mkdir -p _site
          cp data.generated.json _site/data.generated.json
          cp site/index.html _site/index.html
          cp -r site/screenshots _site/screenshots
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: dep
        uses: actions/deploy-pages@v4
